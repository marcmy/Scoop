name: Sync upstream Scoop

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: upstream-scoop-sync
  cancel-in-progress: false

env:
  UPSTREAM_REPOSITORY: ScoopInstaller/Scoop
  UPSTREAM_BRANCH: master
  SYNC_BRANCH: sync/upstream-master
  SYNC_PR_TITLE: 'chore: sync upstream Scoop'
  CONFLICT_ISSUE_TITLE: 'chore: upstream Scoop sync requires conflict resolution'

jobs:
  sync:
    name: Merge upstream into a review branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Check out fork master
        uses: actions/checkout@v7
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: false

      - name: Configure remotes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          gh auth setup-git
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          git fetch --prune origin master
          git fetch --prune upstream "${UPSTREAM_BRANCH}"
          git fetch origin "${SYNC_BRANCH}" || true

      - name: Check whether upstream is already included
        id: status
        shell: bash
        run: |
          set -euo pipefail
          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" origin/master; then
            echo 'up_to_date=true' >> "$GITHUB_OUTPUT"
            echo 'Fork master already contains the current upstream master.' >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'up_to_date=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up stale reports when no changes remain
        if: steps.status.outputs.up_to_date == 'true'
        shell: bash
        run: |
          set -euo pipefail

          pr_number="$(gh pr list --head "${SYNC_BRANCH}" --base master --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)"
          if [[ -n "$pr_number" ]]; then
            gh pr comment "$pr_number" --body 'Closing automatically because `master` already contains the current upstream `master`.' || true
            gh pr close "$pr_number" || true
          fi

          issues_enabled="$(gh api "repos/${GH_REPO}" --jq '.has_issues' 2>/dev/null || echo false)"
          if [[ "$issues_enabled" == 'true' ]]; then
            issue_number="$(gh issue list --state open --limit 100 --json number,title --jq ".[] | select(.title == \"${CONFLICT_ISSUE_TITLE}\") | .number" 2>/dev/null | head -n 1 || true)"
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" --body 'Closing automatically because `master` now contains the current upstream `master`.' || true
              gh issue close "$issue_number" || true
            fi
          fi

      - name: Merge upstream into the sync branch
        if: steps.status.outputs.up_to_date != 'true'
        id: merge
        shell: bash
        run: |
          set -euo pipefail
          git switch --force-create "${SYNC_BRANCH}" origin/master

          set +e
          git merge --no-ff --no-edit "upstream/${UPSTREAM_BRANCH}" > merge-output.txt 2>&1
          merge_status=$?
          set -e

          cat merge-output.txt
          if [[ $merge_status -ne 0 ]]; then
            conflicted_files="$(git diff --name-only --diff-filter=U)"
            {
              echo 'conflict=true'
              echo 'files<<EOF'
              printf '%s\n' "$conflicted_files"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"

            {
              echo '## Upstream merge conflict'
              echo
              echo 'The automated merge was aborted. Conflicting files:'
              echo
              echo '```text'
              printf '%s\n' "$conflicted_files"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"

            git merge --abort
            exit 0
          fi

          echo 'conflict=false' >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$(git rev-parse "upstream/${UPSTREAM_BRANCH}")" >> "$GITHUB_OUTPUT"

      - name: Report merge conflicts
        if: steps.status.outputs.up_to_date != 'true' && steps.merge.outputs.conflict == 'true'
        shell: bash
        env:
          CONFLICTED_FILES: ${{ steps.merge.outputs.files }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          cat > conflict-report.md <<EOF
          The scheduled merge of \`${UPSTREAM_REPOSITORY}:${UPSTREAM_BRANCH}\` into \`${REPOSITORY}:master\` could not be completed automatically.

          Conflicting files:

          \`\`\`text
          ${CONFLICTED_FILES}
          \`\`\`

          The workflow left \`master\` and \`${SYNC_BRANCH}\` unchanged. Resolve the merge manually on a separate branch, then close this issue after the result reaches \`master\`.

          Workflow run: ${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}
          EOF

          cat conflict-report.md >> "$GITHUB_STEP_SUMMARY"

          pr_number="$(gh pr list --head "${SYNC_BRANCH}" --base master --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)"
          if [[ -n "$pr_number" ]]; then
            gh pr comment "$pr_number" --body 'Closing because the latest upstream merge conflicts and the automation branch was intentionally left unchanged.' || true
            gh pr close "$pr_number" || true
          fi

          issues_enabled="$(gh api "repos/${GH_REPO}" --jq '.has_issues' 2>/dev/null || echo false)"
          if [[ "$issues_enabled" == 'true' ]]; then
            issue_number="$(gh issue list --state open --limit 100 --json number,title --jq ".[] | select(.title == \"${CONFLICT_ISSUE_TITLE}\") | .number" 2>/dev/null | head -n 1 || true)"
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" --body-file conflict-report.md || true
            else
              gh issue create --title "${CONFLICT_ISSUE_TITLE}" --body-file conflict-report.md || true
            fi
          else
            echo 'Repository Issues are disabled; the conflict report is available in this run summary.' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push the clean sync branch
        if: steps.status.outputs.up_to_date != 'true' && steps.merge.outputs.conflict != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push --force-with-lease origin "HEAD:refs/heads/${SYNC_BRANCH}"

      - name: Open or update the upstream sync PR
        if: steps.status.outputs.up_to_date != 'true' && steps.merge.outputs.conflict != 'true'
        shell: bash
        env:
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          cat > pr-body.md <<EOF
          Merges the latest \`${UPSTREAM_REPOSITORY}:${UPSTREAM_BRANCH}\` into this fork through a normal reviewable merge commit.

          - Upstream commit: \`${UPSTREAM_SHA}\`
          - Automation branch: \`${SYNC_BRANCH}\`
          - Fork customizations are preserved unless a reviewer explicitly resolves a conflict otherwise.

          This branch is automation-owned and may be force-updated by later sync runs. Do not place manual work directly on it.
          EOF

          pr_number="$(gh pr list --head "${SYNC_BRANCH}" --base master --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" --title "${SYNC_PR_TITLE}" --body-file pr-body.md
          else
            gh pr create --head "${SYNC_BRANCH}" --base master --title "${SYNC_PR_TITLE}" --body-file pr-body.md
          fi

      - name: Close a resolved conflict issue
        if: steps.status.outputs.up_to_date != 'true' && steps.merge.outputs.conflict != 'true'
        shell: bash
        run: |
          set -euo pipefail
          issues_enabled="$(gh api "repos/${GH_REPO}" --jq '.has_issues' 2>/dev/null || echo false)"
          if [[ "$issues_enabled" == 'true' ]]; then
            issue_number="$(gh issue list --state open --limit 100 --json number,title --jq ".[] | select(.title == \"${CONFLICT_ISSUE_TITLE}\") | .number" 2>/dev/null | head -n 1 || true)"
            if [[ -n "$issue_number" ]]; then
              gh issue comment "$issue_number" --body 'The latest automated upstream merge completed cleanly. Closing this conflict report.' || true
              gh issue close "$issue_number" || true
            fi
          fi

      - name: Fail the run after reporting a conflict
        if: steps.status.outputs.up_to_date != 'true' && steps.merge.outputs.conflict == 'true'
        shell: bash
        run: exit 1
